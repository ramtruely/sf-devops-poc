name: Salesforce PR Validation

on:
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # -----------------------------
      # Detect FIRST DEPLOY (TEST)
      # -----------------------------
      - name: Check TEST Deployment Cache
        id: test-cache
        uses: actions/cache@v4
        with:
          path: .deploy_marker_test
          key: deploy-marker-TEST

      # -----------------------------
      # Detect FIRST DEPLOYMENT (LOAD)
      # -----------------------------
      - name: Check LOAD Deployment Cache
        id: load-cache
        uses: actions/cache@v4
        with:
          path: .deploy_marker_load
          key: deploy-marker-LOAD

      # -----------------------------
      # Set VALIDATION LEVEL
      # -----------------------------
      - name: Set Validation Mode
        run: |
          if [ "${{ steps.test-cache.outputs.cache-hit }}" != "true" ] || \
             [ "${{ steps.load-cache.outputs.cache-hit }}" != "true" ]; then
            echo "VALIDATION_LEVEL=basic" >> $GITHUB_ENV
            echo "🚀 First deployment detected → Skipping heavy checks"
          else
            echo "VALIDATION_LEVEL=full" >> $GITHUB_ENV
            echo "✅ Subsequent deployment → Running all checks"
          fi

      # -----------------------------
      # Setup
      # -----------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Install Code Analyzer
        run: sf plugins install @salesforce/sfdx-scanner

      - name: Install Prettier
        run: npm install -g prettier

      - name: Install PMD
        run: |
          wget https://github.com/pmd/pmd/releases/download/pmd_releases%2F6.55.0/pmd-bin-6.55.0.zip
          unzip pmd-bin-6.55.0.zip

      # -----------------------------
      # PR Gate
      # -----------------------------
      - name: Gate PR
        run: echo "PR Validation Started"

      # -----------------------------
      # Commit Message Check
      # -----------------------------
      - name: Check Commit Message
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          echo "$TITLE" | grep -E "^(feat|fix|chore|refactor|test):" || exit 1

      # -----------------------------
      # Code Format
      # -----------------------------
      - name: Prettier Check
        run: npx prettier --check "**/*.{js,ts,html,css,cls}"

      # -----------------------------
      # Static Analysis
      # -----------------------------
      - name: SF Code Analyzer
        run: sf scanner run --target "force-app" --format table

      - name: PMD Scan
        run: |
          ./pmd-bin-6.55.0/bin/run.sh pmd \
            -d force-app \
            -R pmd/ruleset.xml \
            -f text

      # -----------------------------
      # 🔥 CONDITIONAL HEAVY CHECKS
      # -----------------------------
      - name: Package Coverage Check
        if: env.VALIDATION_LEVEL == 'full'
        run: echo "Package coverage logic"

      - name: Calculate Risk Assessment
        if: env.VALIDATION_LEVEL == 'full'
        run: echo "Risk assessment logic"

      - name: SF Unit Test Gate
        if: env.VALIDATION_LEVEL == 'full'
        run: echo "Unit test gate logic"

      - name: Unit test & Deploy validation
        if: env.VALIDATION_LEVEL == 'full'
        run: echo "Combined validation logic"