# PR Validation
name: PR Validation

on:
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Install PMD
        run: |
          wget https://github.com/pmd/pmd/releases/download/pmd_releases%2F6.55.0/pmd-bin-6.55.0.zip
          unzip pmd-bin-6.55.0.zip

      - name: Authenticate Org
        run: |
          echo "${{ secrets.SF_AUTH_URL }}" > auth.txt
          sf org login sfdx-url --sfdx-url-file auth.txt --alias DevHub

      - name: Validate Deployment (Check Only)
        run: |
          sf project deploy start \
            --dry-run \
            --target-org DevHub \
            --test-level RunLocalTests

      - name: Run Apex Tests
        run: |
          sf apex run test \
            --target-org DevHub \
            --result-format human

      - name: Run PMD Scan
        run: |
          ./pmd-bin-6.55.0/bin/run.sh pmd \
          -d force-app \
          -R pmd/ruleset.xml \
          -f text || true 

      - name: Install Code Analyzer
        run: sf plugins install @salesforce/sfdx-scanner

      - name: Run Code Analysis
        run: |
          sf scanner run \
          --target "force-app" \
          --format json \
          --outfile scanner-report.json 
          
      - name: Upload Scanner Report
        uses: actions/upload-artifact@v4
        with:
          name: scanner-report
          path: scanner-report.json 

      - name: Generate Graph
        run: |
          node generate-graph.js
          dot -Tpng graph.dot -o graph.png

      - name: Upload Graph
        uses: actions/upload-artifact@v4
        with:
          name: dependency-graph
          path: graph.png   
