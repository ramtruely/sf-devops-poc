name: Salesforce PR Validation

on:
  pull_request:
    branches: [ main ]

env:
  SKIP_HEAVY_GATES: true   # 🔥 control switch

jobs:

  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # -----------------------------
      # Setup
      # -----------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Install Code Analyzer
        run: sf plugins install @salesforce/sfdx-scanner

      - name: Install Prettier
        run: npm install -g prettier

      - name: Install PMD
        run: |
          wget https://github.com/pmd/pmd/releases/download/pmd_releases%2F6.55.0/pmd-bin-6.55.0.zip
          unzip pmd-bin-6.55.0.zip

      # -----------------------------
      # Auth DevHub
      # -----------------------------
      - name: Authenticate DevHub
        run: |
          echo "${{ secrets.SF_AUTH_DEV }}" > auth.txt
          sf org login sfdx-url --sfdx-url-file auth.txt --alias DevHub

      # -----------------------------
      # Create TEST (Scratch Org)
      # -----------------------------
      - name: Create Scratch Org (TEST)
        run: |
          sf org create scratch \
            --definition-file config/project-scratch-def.json \
            --alias TEST \
            --duration-days 1 \
            --set-default

      # -----------------------------
      # PR Gate
      # -----------------------------
      - name: Gate PR
        run: echo "PR Gate Triggered"

      # -----------------------------
      # Commit Message Check
      # -----------------------------
      - name: Check Commit Message Format
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          echo "$TITLE" | grep -E "^(feat|fix|chore|refactor|test):" || exit 1

      # -----------------------------
      # Formatting
      # -----------------------------
      - name: Code Format Check
        run: npx prettier --check "**/*.{js,ts,html,css,cls}"

      # -----------------------------
      # Static Analysis
      # -----------------------------
      - name: SF Code Analyzer
        run: sf scanner run --target "force-app" --format table

      - name: PMD Scan
        run: |
          ./pmd-bin-6.55.0/bin/run.sh pmd \
          -d force-app \
          -R pmd/ruleset.xml \
          -f text

      # -----------------------------
      # 🔥 CONDITIONAL GATES (SKIPPED NOW)
      # -----------------------------

      - name: Run Apex Tests
        if: env.SKIP_HEAVY_GATES != 'true'
        run: sf apex run test --target-org TEST --result-format human --wait 10

      - name: Validate Deployment
        if: env.SKIP_HEAVY_GATES != 'true'
        run: |
          sf project deploy start \
            --dry-run \
            --target-org TEST \
            --test-level RunSpecifiedTests \
            --tests HelloWorldTest

      - name: Package Coverage Check
        if: env.SKIP_HEAVY_GATES != 'true'
        run: echo "Package coverage logic"

      - name: Calculate Risk Assessment
        if: env.SKIP_HEAVY_GATES != 'true'
        run: echo "Risk logic"

      - name: SF Unit Test Gate
        if: env.SKIP_HEAVY_GATES != 'true'
        run: echo "Unit test gate logic"

      - name: Unit test & Deploy validation test
        if: env.SKIP_HEAVY_GATES != 'true'
        run: echo "Combined validation logic"

      # -----------------------------
      # Deployments (always run)
      # -----------------------------
      - name: Deploy to TEST
        run: |
          sf project deploy start \
            --target-org TEST \
            --test-level NoTestRun

      - name: Deploy to DEV (DevHub)
        run: |
          sf project deploy start \
            --target-org DevHub \
            --test-level NoTestRun

      # -----------------------------
      # Cleanup
      # -----------------------------
      - name: Delete Scratch Org
        if: always()
        run: sf org delete scratch --target-org TEST --no-prompt