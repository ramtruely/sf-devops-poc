name: Salesforce Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # -----------------------------
      # Detect TEST First Deployment
      # -----------------------------
      - name: Check TEST Cache
        id: test-cache
        uses: actions/cache@v4
        with:
          path: .deploy_marker_test
          key: deploy-marker-TEST

      - name: Set TEST Mode
        run: |
          if [ "${{ steps.test-cache.outputs.cache-hit }}" == "true" ]; then
            echo "TEST_FIRST_DEPLOY=false" >> $GITHUB_ENV
          else
            echo "TEST_FIRST_DEPLOY=true" >> $GITHUB_ENV
          fi

      # -----------------------------
      # Detect LOAD First Deployment
      # -----------------------------
      - name: Check LOAD Cache
        id: load-cache
        uses: actions/cache@v4
        with:
          path: .deploy_marker_load
          key: deploy-marker-LOAD

      - name: Set LOAD Mode
        run: |
          if [ "${{ steps.load-cache.outputs.cache-hit }}" == "true" ]; then
            echo "LOAD_FIRST_DEPLOY=false" >> $GITHUB_ENV
          else
            echo "LOAD_FIRST_DEPLOY=true" >> $GITHUB_ENV
          fi

      # -----------------------------
      # Setup
      # -----------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      # -----------------------------
      # Auth
      # -----------------------------
      - name: Authenticate TEST
        run: |
          echo "${{ secrets.SF_AUTH_TEST }}" > auth_test.txt
          sf org login sfdx-url --sfdx-url-file auth_test.txt --alias TEST

      - name: Authenticate LOAD
        run: |
          echo "${{ secrets.SF_AUTH_LOAD }}" > auth_load.txt
          sf org login sfdx-url --sfdx-url-file auth_load.txt --alias LOAD

      # -----------------------------
      # 🔥 TEST Deployment
      # -----------------------------
      - name: TEST - Package Coverage Check
        if: env.TEST_FIRST_DEPLOY != 'true'
        run: |
<<<<<<< HEAD
          echo "TEST: Package coverage logic"
=======
           echo "TEST: Package coverage logic"
>>>>>>> feature/test-pipeline

      - name: TEST - Risk Assessment
        if: env.TEST_FIRST_DEPLOY != 'true'
        run: |
<<<<<<< HEAD
          echo "TEST: Risk logic"
=======
           echo "TEST: Risk logic"
>>>>>>> feature/test-pipeline

      - name: TEST - Unit Test Gate
        if: env.TEST_FIRST_DEPLOY != 'true'
        run: |
<<<<<<< HEAD
          echo "TEST: Unit test gate"
=======
           echo "TEST: Unit test gate"
>>>>>>> feature/test-pipeline

      - name: TEST - Deploy Validation
        if: env.TEST_FIRST_DEPLOY != 'true'
        run: |
<<<<<<< HEAD
          echo "TEST: Combined validation"
=======
           echo "TEST: Combined validation"
>>>>>>> feature/test-pipeline

      - name: Deploy to TEST
        run: |
          sf project deploy start \
            --target-org TEST \
            --test-level NoTestRun

      # -----------------------------
      # Save TEST Marker
      # -----------------------------
      - name: Save TEST Marker
        if: env.TEST_FIRST_DEPLOY == 'true'
        uses: actions/cache@v4
        with:
          path: .deploy_marker_test
          key: deploy-marker-TEST

      # -----------------------------
      # 🔥 LOAD Deployment
      # -----------------------------
      - name: LOAD - Package Coverage Check
        if: env.LOAD_FIRST_DEPLOY != 'true'
        run: |
<<<<<<< HEAD
          echo "LOAD: Package coverage logic"
=======
           echo "LOAD: Package coverage logic"
>>>>>>> feature/test-pipeline

      - name: LOAD - Risk Assessment
        if: env.LOAD_FIRST_DEPLOY != 'true'
        run: |
<<<<<<< HEAD
          echo "LOAD: Risk logic"
=======
           echo "LOAD: Risk logic"
>>>>>>> feature/test-pipeline

      - name: LOAD - Unit Test Gate
        if: env.LOAD_FIRST_DEPLOY != 'true'
        run: |
<<<<<<< HEAD
          echo "LOAD: Unit test gate"
=======
           echo "LOAD: Unit test gate"
>>>>>>> feature/test-pipeline

      - name: LOAD - Deploy Validation
        if: env.LOAD_FIRST_DEPLOY != 'true'
        run: |
<<<<<<< HEAD
          echo "LOAD: Combined validation"
=======
           echo "LOAD: Combined validation"
>>>>>>> feature/test-pipeline

      - name: Deploy to LOAD
        run: |
          sf project deploy start \
            --target-org LOAD \
            --test-level NoTestRun

      # -----------------------------
      # Save LOAD Marker in it
      # -----------------------------
      - name: Save LOAD Marker
        if: env.LOAD_FIRST_DEPLOY == 'true'
        uses: actions/cache@v4
        with:
          path: .deploy_marker_load
          key: deploy-marker-LOAD